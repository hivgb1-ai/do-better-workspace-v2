# ============================================================
# 내 세계 사전 — 나만 아는 것들의 모음
# ============================================================
# "당연해서 안 적었던 앎"이 사는 곳. 스킬(가르기·morning)이 판단 재료로 읽는다.
# 스킬 파일에는 개인 데이터가 한 글자도 없다 — 전부 여기와 자리 선언표에서 온다.
#
# 채우는 법: 처음엔 거의 비어 있는 게 정상. 쓰다가 "이건 항상 이렇게 해줘"라고
#   교정하는 순간이 오면, 그 교정을 여기 한 줄로 적는다 — 그때부터 영구 규칙이 된다.
#   (쓸수록 똑똑해지는 지점. 갱신은 사람이 직접 한다.)

인박스-분류:  # 가르기(inbox-triage)가 읽는 판단 재료

  상시-노이즈-목록:  # "이건 항상 패스" — 출처/제목/본문 부분일치면 본문 안 보고 즉시 noise (버리지 않고 태그 보존)
    # [빈칸] — 예 (형식만 참고):
    # - 패턴: ["OO보안", "1588xxxx"]
    #   설명: "시설 보안 알림. 업무 라우팅 대상 아님. (YYYY-MM-DD 지정)"
    #   noise_type: security

  노이즈-보존-태그:  # noise는 버리지 않고 종류를 태그해 보존 — 나중에 grep하면 도메인 데이터셋이 된다
    noise_type: [card, bank, utility, vendor, accounting, security, otp, ad]   # 기본 8종 + 내 것 추가 가능

  STT-이름-보정:  # 통화 전사의 회사명·이름 오인식 보정
    보정-소스: "자리-선언표.yaml 보정소스 절 참조 (경로·추출 명령은 선언표가 단일 출처)"
    실측-보정-예시:
      # [빈칸] — 실제 보정이 생길 때마다 여기 쌓는다. 예:
      # - "\"OO테카\" → \"OO티카\" (진행표 매치)"
    규칙: "매치 없으면 STT 표기 유지하고 (미확인 — 표기 변형 후보)로 둔다 (창작 금지)"

  발신자-메모:  # 반복 발신자의 신원 — 판정 맥락 (교정 → 영구 규칙으로 누적)
    # [빈칸] — 예:
    # - {발신자: "홍OO", 신원: "우리 매장 관리자 — 메시지는 내부 운영 갈래 (YYYY-MM-DD 확인)"}

  개인-가드:  # 판정 전에 적용되는 나만의 규칙 (가족·개인 영역 보호 등)
    # [빈칸] — 예:
    # - 이름: 자녀 가드
    #   규칙: "자녀 학교·생활 관련은 업무 todo로 넣지 않는다. 학교 자료성이면 별도 폴더 경로 권고"

  회귀-테스트:  # 가르기 엔진·사전을 고친 뒤 같은 판정이 나오는지 확인하는 내 골든 케이스
    # [빈칸] — 첫 실전에서 판정이 좋았던 raw 2~3건을 여기 등록한다. 형식:
    # - 파일: "00-inbox/raw/<파일명>"
    #   정답: "<종류 (신뢰도)> → <목적지>"
    #   오답: "<하면 안 되는 판정>"
    - 통과기준: "판정 → 마킹 → 재실행 시 전부 '신규'로 안 뜸 (재처리 방지)"

아침-루틴:  # morning이 읽는 값 — 선언표가 "값출처: 내-세계-사전"으로 가리키는 것만
  # [빈칸] — 예 (달력키워드 점검을 쓸 때):
  # 세션-D1-달력키워드:
  #   포함: [워크숍, 미팅]
  #   제외: []
  #   안내문: "내일 {일정} — 사전 준비 확인"

회신-원칙:  # reply-draft(회신 절차)가 읽는 내 값 — 말투·금지 표현·첨부
  금지-표현:  # 본문에 절대 안 들어갈 패턴 — reply-draft 검증이 grep으로 잡는다
    # [빈칸] — 예:
    # - 패턴: "(만원|[0-9]+ ?원|VAT)"
    #   설명: "본문 금액 노출 금지 — 가격은 첨부가 담당"
  톤:
    # [빈칸] — 예: "정중하되 담백하게. 빈 칭찬·부풀린 정중체 금지. 서명은 '{이름} 드림'"
  첨부:
    기본-경로: ""   # [빈칸] — 회신에 첨부할 자료가 모여 있는 폴더 (실존 확인에 사용)
    표준-첨부:
      # [빈칸] — 예: "회사 소개서.pdf (가격 포함)"

장부:  # ledger-reconcile(장부 맞추기)가 읽는 내 값 — 분류 패턴·임계값
  자동분류-패턴:
    본인-이체-패턴: []    # [빈칸] — 내 이름·내 계좌 별칭 (내부 이체 = 매칭 제외)
    고정비-패턴: []       # [빈칸] — 매달 나가는 곳 (보험·전기·카드 등)
  age-임계값:
    # [빈칸] — 예:
    # - {일수: "14일 이상", 마커: "⚠"}
    # - {일수: "30일 이상", 마커: "⚠️"}
  거래처-별칭:
    # [빈칸] — 거래내역 표기 ↔ 실제 거래처 매핑. 예: {표기: "OO상사(주)", 거래처: "OO상사"}
