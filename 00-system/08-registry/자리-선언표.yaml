# ============================================================
# 자리 선언표 — 내 표면과 수집기가 어디 있고 어떤 모양인지
# ============================================================
# 이 파일은 "기계가 읽는 내 워크스페이스 지도"다. 스킬(morning·collect·inbox-triage)은
# 자기 목록을 갖지 않는다 — 전부 여기 선언된 것을 읽고 돈다.
# 그래서 새 채널·새 점검을 붙일 때 스킬을 고칠 필요가 없다. 여기 한 줄 등록하면 끝.
#
# 채우는 법 (세팅 절차 — /setup-workspace 6단계):
#   [빈칸]  = 사람마다 다른 값. 실물(내 카톡방·엑셀·메일함)을 열어 놓고 채운다.
#   기본값  = 이 워크스페이스 골격 그대로면 안 바꿔도 됨.
# 갱신 규칙: 표면의 위치·모양을 바꾸면 반드시 이 파일도 같이 고친다.
#           안 지키면 이 파일은 낡은 지도가 되고, 스킬이 낡은 지도를 진실로 믿는다.

뿌리:
  워크스페이스: "git 저장소 루트 (스킬이 자동 감지: git rev-parse --show-toplevel)"

# ------------------------------------------------------------
# 표면 — 정보가 최종적으로 놓이는 파일들
# 아침점검: morning 바퀴 2가 읽는 선언. 유형은 5종뿐 —
#   실행신선도 / 도착신선도 / 개수 / 헤더룰 / 달력키워드 (유형 구현은 morning 스킬에)
# ------------------------------------------------------------
표면:

  할일:
    위치: "40-personal/46-todos/active-todos.md"
    무엇: 할 일 + 회신대기
    모양:
      섹션: ["🔥 Today", "📅 This Week", "⏳ Waiting"]
    쓰는스킬: [todo, todos, morning, daily-note, daily-review, inbox-triage]
    아침점검:
      - {유형: 개수, 위치: "Today 섹션의 '- [' 항목", 알림: "개수 표시 (정보 제공용)"}

  일기:
    위치: "40-personal/41-daily/YYYY-MM/YYYY-MM-DD.md"
    무엇: 하루치 일정+할 일+진행+완료+회고
    쓰는스킬: [daily-note, daily-review, morning]
    보호단위: "구역 — 회고 등 사람이 쓴 구역은 기계가 덮지 않는다"

  위키:
    위치: "30-knowledge/00-wiki/"
    무엇: 토픽별 지식 복리 축적
    모양: "SCHEMA.md가 정의"
    쓰는스킬: [wiki-ingest, wiki-lint]
    보호단위: 페이지

  원본함:
    위치: "00-inbox/raw/"
    무엇: 모든 수집의 도착지 — 원본 불변 (수집기 약속 ①. 처리돼도 지우지 않는다 — 마커만 붙는다)
    모양:
      파일명: "YYYY-MM-DD_HHMMSS_<채널표식>.md"
      머리말: [source, collected, "원천시각(채널별 이름 — 예: kakao_date)", "고유표식(채널별 — 예: kakao_chat_id)", channel, processed, routed_to, triaged]
      제외: "_media/ 디렉터리 (첨부 원본 저장소 — 스캔 대상 아님)"
    쓰는스킬: [inbox-triage(가르기 마커), collect, 모든 수집기(떨구기)]
    아침점검:
      - {유형: 개수, 위치: "*.md 중 'processed: false'", 알림: "1건 이상 → 가르기 이어가기 (아래 이어가기 절)"}

  장부:   # [빈칸] — 미수금·미발행 추적 표면 (ledger-reconcile가 갱신. 정형 입구를 안 쓰면 이 절 삭제)
    # 위치: "20-operations/장부.md"
    # 무엇: 발행↔입금 매칭 결과 — 미수금·미발행·오래된 건
    # 쓰는스킬: [ledger-reconcile, morning]
    # 아침점검:
    #   - {유형: 도착신선도, 날짜패턴: "헤더 '마지막 업데이트: YYYY-MM-DD'", 기대: 14일, 알림: "초과 → 장부 맞추기 권고"}

  진행표:   # [빈칸] — 내 업무의 중심 표면 (영업 파이프라인·수주 현황·프로젝트 보드 등. 없으면 이 절 삭제)
    위치: "[빈칸 — 예: 10-projects/XX-업무/진행표.md]"
    무엇: "[빈칸 — 무엇을 추적하는 표인가]"
    모양:
      칸: "[빈칸 — 열 이름들. 이 칸 이름·단계 단어가 시스템의 이음새가 된다]"
    단어약속:
      단계: "[빈칸 — 단계 칸에 쓸 단어 목록을 고정한다. 변형 금지]"
    보호단위: "행·칸 규칙 — 기계가 써도 되는 칸과 사람 칸을 정한다"

# ------------------------------------------------------------
# 파일 밖 표면 — 파일이 아니라서 보호 단위·이력(git)이 적용 안 되는 표면
# 원칙: 등록·변경의 흔적을 파일 쪽에도 남긴다
# ------------------------------------------------------------
파일밖표면:
  캘린더:   # [빈칸] — 캘린더 연동이 있으면 채우고, 없으면 이 절 삭제 (일정은 todo로 흡수됨)
    무엇: "[빈칸 — 어떤 캘린더들 (업무/개인 구분)]"
    캘린더구분: "[빈칸 — 어떤 일정이 어느 캘린더로 가나]"
    흔적: "등록 시 일기·진행표에 함께 기록"

# ------------------------------------------------------------
# 수집기 — 채널에서 원본함으로 가져오는 것들
# (약속 3가지: 한 번만 쌓임 · 마지막 시각 남김 · 원본 그대로 — 00-system/03-guides/수집기-약속.md)
# 실행주기·실행명령: /collect가 사용. 실행신선도·도착신선도: morning 바퀴 1이 사용.
# ★ 킷 성립 조건: 손 수집만으로는 감시가 원리적으로 안 된다(멈춤과 없음을 구분 못 함).
#   최소 1개 자동 채널(대개 메일 또는 카톡)을 연결해야 시스템이 성립한다.
# ------------------------------------------------------------
수집기:

  손-붙여넣기:
    갈래: [미연결 채널 전부 (DM·문자·통화 메모 등)]
    방식: "손 — 대화에 붙여넣기 (수집기 약속 '손 수집기 조항': ①어느 채널인지 말한다 ②원본 그대로)"
    실행주기: 손
    포착: "골라 넣기 (놓침은 사람 몫)"
    고유표식: "받는 쪽이 자동 부여 (내용 지문)"
    구조적한계: "멈춤과 없음을 구분할 수 없음 — 신선도 감시 원리적 불가. 그래서 자동 채널 1개가 필수"

  카톡-읽기:   # kakao-read 스킬 동봉 (Mac: 본인 카톡 로컬 DB 직독). 안 쓰면 이 절 삭제
    갈래: [1:1 대화, "그룹 ≤N명 (config check_group_max_members — 기본 5)"]
    방식: "손 트리거 (\"카톡 체크\") — 메뉴형 수집: 후보를 차려주면 내가 골라 읽고, 업무 신호만 raw로 떨군다"
    실행주기: "손 (24시간 내 1회 이상 권장)"
    실행신선도: "마지막 체크 24시간 초과 = 이상"   # 사람이 폰으로 읽은 것은 시스템에는 없는 정보다
    상태파일: "~/.config/kakao-read/config.json 의 last_check 키 (kakao_read.py mark가 기록)"
    고유표식: kakao_chat_id + 시각
    경로: "로컬만 (프라이버시 최상)"
    알려진위험: "카톡 업데이트로 DB 구조 바뀌면 조용히 깨짐 — 실행신선도(약속 2)가 유일한 방어"

  메일:   # [빈칸] — 메일 연동 방식은 사람마다 다름. 연동 전이면 손-붙여넣기로 수집
    갈래: [받은편지함]
    방식: "[빈칸 — 자동 조회(API) / 손 붙여넣기]"
    실행주기: "[빈칸]"
    포착: 전량
    신선도기대: "[빈칸]"
    고유표식: "메일 메시지 ID (원천 제공)"
    경로: 본인계정

  # [빈칸] — 내 채널을 여기 추가한다. 새 수집기를 붙이기 전 /collector-check로 검사표 6문을 통과시킨다.
  # 자동 수집기 필수 필드: 갈래·방식·실행주기·실행명령·실행신선도·상태파일·고유표식·경로

# ------------------------------------------------------------
# 정형 입구 — 원본함을 거치지 않는 두 번째 길 (표 데이터는 AI 가르기가 아니라 표 맞추기)
# ------------------------------------------------------------
정형입구:
  # [빈칸] — 예: 은행 거래내역 xlsx · ERP export · 정산 CSV. 없으면 비워 둔다.
  # 필수 필드: 위치(내려받아 두는 곳)·방식·신선도기대. 원칙: 파일도 원본이다 — 쌓기만 하고 고치지 않는다.

# ------------------------------------------------------------
# 보정소스 — 고유명사 grep 보정의 원천 (가르기 STT/오타 보정이 읽음)
# 규칙(grep 의무·창작 금지)은 엔진에, 실측 보정 예시는 내 세계 사전에
# ------------------------------------------------------------
보정소스:
  # [빈칸] — 회사명·거래처·고객명이 정확히 적혀 있는 내 파일과 추출 명령.
  # 예:
  #   회사명:
  #     위치: "10-projects/XX-업무/진행표.md"
  #     추출: 'grep 명령 — 회사 칸만 뽑는다'

# ------------------------------------------------------------
# 업무카테고리 — 공통 5종(일정·할일·회신·참고·버림) 밖의, 내 업무 고유 갈래
# 가르기가 이 선언을 2차 판정에 합류시킨다. 내 업무의 "이건 특별 취급" 갈래를 등록.
# ------------------------------------------------------------
업무카테고리:
  # [빈칸] — 예 (구조만 참고, 값은 내 업무로):
  #   발주-문의:
  #     신호: "회사 + 발주/견적 문의 언급"
  #     신뢰도: "0.8+"
  #     목적지스킬: "[이 갈래를 처리하는 스킬 또는 표면]"
  #     흡수: "캘린더·todo는 따로 등록하지 않는다 — 목적지 흐름에서 처리 (이중등록 방지)"
  #     핸드오프필드: [출처(raw 경로+고유표식), 채널, "회사(추정)+표기 변형 후보", 발신자, "핵심 요지(원문 인용)"]
  #     마킹: "완결 → processed:true / 회신 대기 → processed:false + routed_to: <목적지> (pending)"

# ------------------------------------------------------------
# 이어가기 — morning 바퀴 3: 조건이 참이면 다음 스킬을 자동으로 잇는다
# (승인은 언제나 사람 — 잇는 건 노동이지 결정이 아니다)
# ------------------------------------------------------------
이어가기:
  - 조건: "오늘 데일리 없음 (40-personal/41-daily/$MONTH/$TODAY.md 부재)"
    실행: "daily-note 생성 → daily-review"
    순서: 상태판 직후
    상세: "우선순위 Top 기입은 근거 있는 항목만(할일 Today·오늘 일정), 없는 일 창작 금지. 노트가 이미 있으면 변동분만 추가 제안(덮어쓰지 않음)"
  - 조건: "미처리 raw 1건 이상 (원본함 아침점검 개수)"
    실행: inbox-triage
    순서: 마지막
    상세: "가르기 결과·제안까지 차려 승인만 받게. 도착신선도 경고가 떠 있으면 분류 전에 먼저 알림. 상태판을 먼저 다 보여준 뒤 넘어간다"

# ------------------------------------------------------------
# 개인점검 — 아침 점검 유형 5종에 안 맞는 나만의 점검 (자유 서술 — 실행자는 Claude)
# 유형을 새로 만들지 말고 일단 여기 자유 서술로 등록한다.
# ------------------------------------------------------------
개인점검:
  # [빈칸] — 예:
  #   - 이름: 가족 일정 (D-1)
  #     설명: "내일 기준으로 챙길 것"
  #     상세: |
  #       데이터: 40-personal/XX-가족/ 파일들
  #       판정: 내일 제출물 → [todo] / 해당 없음 → [done]
